server {
    listen 3000;
    server_name localhost;

    root /app/web;
    index index.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;

    # Serve React SPA — fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve dashboard.json from mounted ~/.aitri-hub/ volume (read-only)
    location /data/ {
        alias /data/;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Access-Control-Allow-Origin "http://localhost:3000" always;
        default_type application/json;
        try_files $uri =404;
    }

    # Disable access log for health checks
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    error_page 404 /index.html;
}
